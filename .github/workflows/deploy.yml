name: Deploy Markdown to GitHub Pages

on:
  push:
    branches:
      - main # Change this to 'master' if your default branch is named master
  workflow_dispatch: # Allows you to run this manually from the Actions tab

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps:deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Build Directory
        run: mkdir -p _site

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      # Converts your Markdown file to HTML. 
      # REPLACE 'README.md' with the actual filename of your markdown file (e.g., 'index.md').
      - name: Convert Markdown to HTML
        run: |
          pandoc README.md -s -o _site/index.html --metadata title="My Published Page"

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
