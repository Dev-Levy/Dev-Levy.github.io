name: Deploy Markdown to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Build Directory
        run: mkdir -p _site

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      # This step builds a native, full-screen HTML file wrapping your markdown
      - name: Convert Markdown to Full-Screen GitHub Dark Page
        run: |
          cat << 'EOF' > _site/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Levy page</title>
              <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-dark.min.css">
              <style>
                  html, body {
                      background-color: #0d1117 !important; 
                      margin: 0;
                      padding: 0;
                      min-height: 100vh;
                      width: 100%;
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
                  }
                  .container {
                      box-sizing: border-box;
                      min-width: 200px;
                      max-width: 980px;
                      margin: 0 auto;
                      padding: 45px 20px;
                  }
                  .markdown-body {
                      background-color: #0d1117 !important;
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <article class="markdown-body">

                  EOF
                  pandoc index.md >> _site/index.html
                  cat << 'EOF' >> _site/index.html

                  </article>
              </div>
          </body>
          </html>
          EOF

          # Note: If your markdown file is named README.md instead of index.md, 
          # just change "pandoc index.md" to "pandoc README.md" in the script above.

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
